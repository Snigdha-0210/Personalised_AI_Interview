services:
  - type: web
    name: hiremind-backend
    env: node
    buildCommand: npm install && npx tsc server/index.ts
    startCommand: npx tsx server/index.ts
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
